# Los 3 roles fijos del ciclo TDD. Cada rol declara su prompt (contrato), el
# proveedor+modelo por defecto, y las tools que tiene permitidas.
#
# El default es lo que corre si no pasas override por CLI:
#   orchestra run builder --slug X                  -> usa el default de abajo
#   orchestra run builder --slug X --provider codex -> override puntual
#   orchestra cycle --slug X --builder codex        -> override en el ciclo
#
# Rotar modelos = cambiar `default_provider`/`default_model` aquí, o pasar overrides.

# Patrón de coste: modelo POTENTE donde se razona (planner diseña la tarea,
# tester revisa y emite veredicto) y modelo ECONÓMICO donde se ejecuta una tarea
# ya definida (builder). Igual que dev-config: planner/tester=Opus, builder=Sonnet.

[roles.planner]
prompt = "src/orchestra/roles/planner.md"
default_provider = "claude"
default_model = "claude-opus-4-7"               # razonamiento: modelo potente
tools = ["read", "grep", "glob", "bash_safe"]   # solo lee + escribe progress/, no edita código
skills = ["self-critique"]                      # valida la tarea (CAs verificables) antes de emitir

[roles.builder]
prompt = "src/orchestra/roles/builder.md"
default_provider = "claude"
default_model = "claude-sonnet-4-6"             # ejecución: modelo económico
tools = ["read", "edit", "write", "bash", "grep", "glob"]
skills = ["systematic-debugging"]               # causa raíz antes de fix si fallan tests

[roles.tester]
prompt = "src/orchestra/roles/tester.md"
default_provider = "claude"
default_model = "claude-opus-4-7"               # razonamiento/veredicto: modelo potente
tools = ["read", "grep", "glob", "bash_test"]   # read-only + runners de test
skills = ["security-review", "rgpd-review"]     # OWASP + PII al revisar el código del builder
