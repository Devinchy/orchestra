# Cómo se EJECUTA cada rol que necesita tocar el repo.
#
# orchestra orquesta (routing + gate PII + prompt). La ejecución de herramientas
# (editar archivos, correr tests) se delega a CLIs agénticos maduros, dirigida por
# rol: solo el builder edita código. planner/tester razonan vía el proxy.
#
# Plantilla de comando: {model} se sustituye por el modelo resuelto; {prompt_file}
# (si aparece) por la ruta a un archivo temporal con el prompt. Si no aparece
# {prompt_file}, el prompt se envía por stdin.

[backends.claude_code]
# stream-json + verbose: emite la traza de tool-calls y el coste real, que orchestra
# parsea para observabilidad. El texto final se extrae como resultado del builder.
command = "claude -p --model {model} --permission-mode acceptEdits --output-format stream-json --verbose"

[backends.codex_cli]
command = "codex exec -m {model} --full-auto"

# aider cubre los proveedores SIN CLI agéntico propio (deepseek/qwen/gemini).
# via_proxy=true: aider no usa keys propias — orchestra le inyecta OPENAI_API_BASE/KEY
# apuntando al proxy litellm, y habla con él como si fuera OpenAI (--model openai/...).
[backends.aider]
command = "aider --model openai/{model} --yes --message-file {prompt_file}"
via_proxy = true

# Qué backend usa el BUILDER según el proveedor que resuelva el routing.
# Si un proveedor no está aquí, el builder cae a ejecución documental (proxy).
[builder_backend]
claude = "claude_code"
codex = "codex_cli"
deepseek = "aider"
qwen = "aider"
gemini = "aider"
