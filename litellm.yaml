# Config del PROXY litellm local. Lo levanta `just proxy` (o
#   .venv/Scripts/python.exe -m litellm --config litellm.yaml --port 4000)
#
# orchestra habla con este proxy por HTTP (OpenAI-compatible). Las API keys se
# leen del entorno (.env) — orchestra nunca las ve.
#
# Los `model_name` de aquí son los que orchestra referencia en config/providers.toml
# (campo proxy_models). El `model:` dentro de litellm_params es el ID real del
# proveedor — AJUSTA los IDs exactos según disponibilidad cuando configures tus keys.

model_list:
  # --- Claude (Anthropic) ---
  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- Codex (OpenAI) ---
  - model_name: gpt-5-codex
    litellm_params:
      model: openai/gpt-5-codex
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY

  # --- DeepSeek ---
  - model_name: deepseek-coder
    litellm_params:
      model: deepseek/deepseek-coder
      api_key: os.environ/DEEPSEEK_API_KEY
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  # --- Qwen (Ollama local, open-weights) ---
  - model_name: qwen3-coder
    litellm_params:
      model: ollama/qwen3-coder
      api_base: os.environ/OLLAMA_HOST

  # --- Gemini (Google) ---
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GOOGLE_API_KEY
  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_API_KEY

# MCP bridge — expone Engram (memoria persistente) a CUALQUIER proveedor que pase
# por el proxy. Esto es lo que hace que la memoria sea cross-model: Claude, Codex,
# DeepSeek... todos leen/escriben la misma SQLite de Engram.
mcp_servers:
  engram:
    command: engram
    args: ["mcp"]
    # La BD vive en $HOME/.engram (compartida con dev-config si lo usas).

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  # Logging local sin filtrar PII a terceros. drop_params evita que un param no
  # soportado por un proveedor (ej. tool_choice en qwen) tumbe la llamada.
  drop_params: true
